<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسعار الذهب - AMIR ESSAWY</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="loading" class="loading">جارِ التحميل...</div>
    
    <div class="controls">
        <button id="fullscreenBtn" class="btn-icon">شاشة كاملة ⛶</button>
    </div>

    <header>
        <h1 class="logo-text">AMIR ESSAWY</h1>
        <div class="date-display" id="dateDisplay"></div>
    </header>

    <main>
        <div class="prices-grid">
            <!-- عيار 24 -->
            <div class="price-card">
                <h2 class="card-title">عيار 24</h2>
                <div class="price-row">
                    <span class="price-label">شراء:</span>
                    <span class="price-value" id="gold24-buy">0</span>
                </div>
                <div class="price-row">
                    <span class="price-label">بيع:</span>
                    <span class="price-value" id="gold24-sell">0</span>
                </div>
            </div>

            <!-- عيار 21 -->
            <div class="price-card">
                <h2 class="card-title">عيار 21</h2>
                <div class="price-row">
                    <span class="price-label">شراء:</span>
                    <span class="price-value" id="gold21-buy">0</span>
                </div>
                <div class="price-row">
                    <span class="price-label">بيع:</span>
                    <span class="price-value" id="gold21-sell">0</span>
                </div>
            </div>

            <!-- عيار 18 -->
            <div class="price-card">
                <h2 class="card-title">عيار 18</h2>
                <div class="price-row">
                    <span class="price-label">شراء:</span>
                    <span class="price-value" id="gold18-buy">0</span>
                </div>
                <div class="price-row">
                    <span class="price-label">بيع:</span>
                    <span class="price-value" id="gold18-sell">0</span>
                </div>
            </div>

            <!-- جنيه ذهب -->
            <div class="price-card">
                <h2 class="card-title">جنيه ذهب</h2>
                <div class="price-row">
                    <span class="price-label">شراء:</span>
                    <span class="price-value" id="pound-buy">0</span>
                </div>
                <div class="price-row">
                    <span class="price-label">بيع:</span>
                    <span class="price-value" id="pound-sell">0</span>
                </div>
            </div>
        </div>
    </main>

    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
