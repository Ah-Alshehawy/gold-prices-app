<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - أسعار الذهب</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="loading" class="loading">جارِ الاتصال...</div>
    <div id="toast" class="toast">تم الحفظ بنجاح!</div>

    <header>
        <h1 class="logo-text">لوحة التحكم</h1>
        <div style="color: var(--text-secondary)">تحديث الأسعار المباشر</div>
    </header>

    <main class="admin-main">
        <form id="adminForm" class="admin-form">
            <!-- عيار 24 -->
            <div class="form-group">
                <h3>عيار 24</h3>
                <div class="input-row">
                    <div class="input-col">
                        <label>شراء:</label>
                        <input type="number" id="input-gold24-buy" required step="any">
                    </div>
                    <div class="input-col">
                        <label>بيع:</label>
                        <input type="number" id="input-gold24-sell" required step="any">
                    </div>
                </div>
            </div>

            <!-- عيار 21 -->
            <div class="form-group">
                <h3>عيار 21</h3>
                <div class="input-row">
                    <div class="input-col">
                        <label>شراء:</label>
                        <input type="number" id="input-gold21-buy" required step="any">
                    </div>
                    <div class="input-col">
                        <label>بيع:</label>
                        <input type="number" id="input-gold21-sell" required step="any">
                    </div>
                </div>
            </div>

            <!-- عيار 18 -->
            <div class="form-group">
                <h3>عيار 18</h3>
                <div class="input-row">
                    <div class="input-col">
                        <label>شراء:</label>
                        <input type="number" id="input-gold18-buy" required step="any">
                    </div>
                    <div class="input-col">
                        <label>بيع:</label>
                        <input type="number" id="input-gold18-sell" required step="any">
                    </div>
                </div>
            </div>

            <!-- جنيه ذهب -->
            <div class="form-group">
                <h3>جنيه ذهب</h3>
                <div class="input-row">
                    <div class="input-col">
                        <label>شراء:</label>
                        <input type="number" id="input-pound-buy" required step="any">
                    </div>
                    <div class="input-col">
                        <label>بيع:</label>
                        <input type="number" id="input-pound-sell" required step="any">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-save">حفظ وتحديث الأسعار</button>
            
            <div style="margin-top: 15px; text-align: center;">
                <a href="index.html" target="_blank" style="color: var(--text-main); text-decoration: none;">عرض شاشة الأسعار</a>
            </div>
        </form>
    </main>

    <script src="firebase-config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
